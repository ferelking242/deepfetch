name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build deepfetch
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            dashboard/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepfetch-${{ github.sha }}
          path: |
            server/dist/
            server/src/db/schema.sql
            server/config.example.yaml
            server/package.json
            dashboard/dist/
          retention-days: 30

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & build all
        run: |
          cd server && npm ci && npm run build
          cd ../dashboard && npm ci && npm run build

      - name: Package release
        run: |
          mkdir -p release/server release/dashboard
          cp -r server/dist server/package.json server/config.example.yaml server/src/db/schema.sql release/server/
          cp -r dashboard/dist release/dashboard/
          cd release && tar -czf ../deepfetch-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: deepfetch-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
